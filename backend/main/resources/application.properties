spring.application.name=mux-video-rooms
server.port=8080

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - let Flyway manage schema, Hibernate just maps
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# LiveKit
livekit.url=${LIVEKIT_URL}
livekit.public-url=${LIVEKIT_PUBLIC_URL}
livekit.api-key=${LIVEKIT_API_KEY}
livekit.api-secret=${LIVEKIT_API_SECRET}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Ngrok url + allowed origins
app.cors.allowed-origins=http://localhost:5173,http://localhost,http://localhost:80,${NGROK_URL}

# Actuator - only expose health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
