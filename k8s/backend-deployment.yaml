apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: huddle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: db-migrate
          image: postgres:15-alpine
          command:
            - bash
            - -c
            - |
              until pg_isready -h huddle-postgres-rw -U huddle; do
                echo "Waiting for postgres..."; sleep 2
              done
              TABLE_EXISTS=$(psql -h huddle-postgres-rw -U huddle -d muxvideorooms -tAc \
                "SELECT COUNT(*) FROM information_schema.tables WHERE table_name='contact'")
              if [ "$TABLE_EXISTS" = "0" ]; then
                echo "Running migrations..."
                psql -h huddle-postgres-rw -U huddle -d muxvideorooms -f /migrations/init.sql
                echo "Migrations done."
              else
                echo "Migrations already applied, skipping."
              fi
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      containers:
        - name: backend
          image: klm89/huddle-backend:63e6e92803ecae84ac544c736c403c9eae7a715c
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
      volumes:
        - name: migrations
          configMap:
            name: db-migrations
