apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: huddle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: klm89/huddle-frontend:d9d644764506beec49411df6af9bf49ced9505ee
          ports:
            - containerPort: 80
