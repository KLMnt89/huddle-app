apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: huddle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: klm89/huddle-frontend:63e6e92803ecae84ac544c736c403c9eae7a715c
          ports:
            - containerPort: 80
