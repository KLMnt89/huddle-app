apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: huddle
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/KLMnt89/huddle-app
    targetRevision: master
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: huddle
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
